<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1035"/>
      <stop offset="50%" stop-color="#0f2040"/>
      <stop offset="100%" stop-color="#1a1035"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0c040"/>
      <stop offset="100%" stop-color="#c8940a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c040" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f0c040" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <!-- Glow -->
  <rect width="64" height="64" rx="16" fill="url(#glow)"/>
  <!-- Decorative outer border -->
  <rect x="2.5" y="2.5" width="59" height="59" rx="14" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.5"/>
  <!-- Inner border -->
  <rect x="5" y="5" width="54" height="54" rx="12" fill="none" stroke="url(#gold)" stroke-width="0.5" opacity="0.3"/>
  <!-- Corner ornaments -->
  <circle cx="10" cy="10" r="2" fill="url(#gold)" opacity="0.6"/>
  <circle cx="54" cy="10" r="2" fill="url(#gold)" opacity="0.6"/>
  <circle cx="10" cy="54" r="2" fill="url(#gold)" opacity="0.6"/>
  <circle cx="54" cy="54" r="2" fill="url(#gold)" opacity="0.6"/>
  <!-- Top arc decoration -->
  <path d="M 18 14 Q 32 8 46 14" stroke="url(#gold)" stroke-width="1.5" fill="none" opacity="0.8" stroke-linecap="round"/>
  <!-- Arabic: القرآن (two-line) -->
  <text x="32" y="35" font-family="Amiri, Traditional Arabic, serif" font-size="15" font-weight="700"
        text-anchor="middle" fill="url(#gold)">القرآن</text>
  <text x="32" y="50" font-family="Amiri, Traditional Arabic, serif" font-size="11" font-weight="400"
        text-anchor="middle" fill="url(#gold)" opacity="0.85">الكريم</text>
  <!-- Bottom arc -->
  <path d="M 18 57 Q 32 61 46 57" stroke="url(#gold)" stroke-width="1" fill="none" opacity="0.5" stroke-linecap="round"/>
</svg>